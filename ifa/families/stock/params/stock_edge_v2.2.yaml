version: stock_edge_v2.2

runtime:
  default_lookback_days: 7
  run_mode: manual
  timezone: Asia/Shanghai
  market_close_cutoff: "15:00"

data:
  technical_lookback_days: 360
  local_first: true
  tushare_backfill_on_missing: true

research_prefetch:
  enabled: true
  include_target: true
  include_sector_leaders: true
  max_sector_peers: 4
  analysis_types: [annual, quarterly]
  tier: deep
  reuse: true
  llm_for_target: true
  llm_for_sector_peers: false
  llm_timeout_seconds: 45.0
  fail_soft: true

intraday:
  enabled: optional
  default_window_days: 30
  backfill_on_missing: true
  sweep:
    5min_days: 30
    30min_days: 60
    60min_days: 90
  full_market_backfill: false

tuning:
  enabled: true
  mode: global_preset_plus_pre_report_overlay
  global_preset:
    enabled: true
    universe: top_liquidity_500
    refresh_schedule: weekly_weekend
    min_stocks: 300
    max_stocks: 800
    backfill_short_history: true
    max_backfill_stocks: 50
    artifact_ttl_days: 10
    max_candidates: 96
  pre_report_overlay:
    enabled: true
    backfill_on_short_history: true
    ttl_days: 10
    min_history_rows: 360
    max_history_rows: 900
    max_runtime_seconds: 900
    max_candidates: 64
    search_space: continuous
    base_from: latest_global_preset
  per_stock_ttl_days: 10
  min_history_rows: 360
  max_history_rows: 900
  max_runtime_seconds: 900
  long_windows: [60, 180, 360]
  offline_validation:
    purpose: promotion_and_governance_not_report_time_tuning
    train_days: 90
    validation_days: 60
    embargo_days: 5
  objectives:
    hit_50pct_40d: 0.35
    avg_return_40d: 0.20
    max_drawdown: -0.20
    stop_first_rate: -0.15
    fill_rate: 0.05
    turnover_penalty: -0.05
