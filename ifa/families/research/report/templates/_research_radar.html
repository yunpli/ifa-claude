<section class="section">
  <h2 class="section__title">5 维评分</h2>
  {% if s.narrative %}
  <div class="narrative narrative--overall">{{ s.narrative }}</div>
  {% endif %}
  <table class="radar-table">
    <thead>
      <tr><th>维度</th><th class="num">得分</th><th class="center">状态</th><th class="num">权重覆盖</th></tr>
    </thead>
    <tbody>
      {% for fam in s.families %}
      <tr>
        <td>{{ fam.label_zh }}</td>
        <td class="num">{{ fam.score | fmt_score }}</td>
        <td class="center"><span class="badge badge--{{ fam.status }}">{{ fam.status | status_icon }} {{ fam.status | status_label_zh }}</span></td>
        <td class="num">{{ '%.0f%%' | format((fam.weight_coverage or 0) * 100) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
