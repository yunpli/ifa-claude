ranker:
  decay:
    observation_floor_pp: -10
    suspension_floor_pp: -15
  diversity:
    top_cap_per_setup: 3
  regime_boost: 0.1
  winrate:
    floor_ratio: 0.4
    target_pct: 30
  tiers:
    a_size: 10
    b_size: 20
    c_size: 100
universe:
  min_avg_amount_yi: 0.2          # 20d avg amount 下限：0.2 亿元 = 2000 万元
  min_coverage_pct: 90            # 20d 内有 raw_daily 行的天数比例（剔除停牌）

sector_flow:
  # ── Layer 1 — DISCRETE governance switches (A/B test, not continuous tune) ──
  exclude_retreat_phase: true     # 退潮 cycle_phase 直接剔除股票
  exclude_retreat_role: true      # 退潮 role 直接剔除
  exclude_unidentified_role: false # 未识别 role 是否剔除（默认保留）

  # ── Layer 2 — CONTINUOUS scoring weights (greedy-search optimizable) ──
  quality_weight_min: 0.6         # 最差留 60% — 防止极端归零导致候选稀缺
  quality_weight_max: 1.0         # 最好不再加成 — 防止 macro 过拟合
  net_outflow_pct_floor: 0.10     # net_amount percentile <10% 触发硬剔除
  rank_weight: 0.5                # 板块当日 net_amount 横截面 rank 权重
  phase_weight: 0.3               # data-derived phase score 权重
  confidence_weight: 0.2          # SmartMoney role/phase 置信度权重

  # NOTE: phase_scores INTENTIONALLY NOT here — auto-derived from rolling 60d
  # T+15 historical returns by metrics.compute_sector_phase_metrics. As market
  # behavior shifts, scores adapt. See ta/sector_phase_metrics.py.
regime:
  thresholds:
    cooldown:
      n_down_min: 3000
      n_limit_down_strong: 25
      n_limit_down_weak: 15
      udr_med: 0.7
      udr_strong: 0.6
      udr_weak: 0.8
    distribution_risk:
      ld_vs_lu_ratio: 1.5
      n_down_strong: 4500
      n_limit_down_strong: 50
      n_limit_down_with_down: 30
    early_risk_on:
      absolute_lu_min: 70
      absolute_up_min: 4000
      udr_strong_min: 1.7
    range_bound:
      ma_diff_pct_max: 0.01
      vol_pct_max: 8
  vetos:
    range_bound:
      cooldown_path_n_down_min: 3000
      cooldown_path_udr_max: 0.7
      n_down_max: 3700
      n_limit_down_max: 25
      n_limit_up_max: 80
      n_up_max: 4200
    trend_continuation:
      defer_to_early_lu_min: 70
      defer_to_early_up_min: 4000
      n_down_max: 3700
      n_limit_down_max: 25
      udr_min: 1.265
version: 2.3.0

# ─── M10 P1 — new sections ──────────────────────────────────────────────

# Recommended-price ATR coefficients (Wall-Street standard).
# entry = entry_close × (1 + entry_offset_atr × ATR%)
# stop  = entry × (1 − k_stop × ATR%)         k_stop = 2.0 → -2 ATR
# target= entry × (1 + k_target × ATR%)       k_target = 4.0 → +4 ATR → R:R 2:1
recommended_price:
  k_stop: 1.5      # tightened from 2.0 — smaller stops in choppy market
  k_target: 3.0    # tightened from 4.0 — smaller targets, easier to hit (R:R 2:1 preserved)
  # entry_offset_atr is per-setup-category in code (not tunable per-yaml).

# T+15 holding-period optimization weights for backtest objective.
backtest_objective:
  weights:
    t15: 0.7      # main: 1-2-week target
    t5:  0.2      # short-leg sanity
    t10: 0.1      # bridge
  walk_forward:
    is_trade_days: 90    # in-sample window for parameter search
    oos_trade_days: 30   # out-of-sample validation
    n_rolls: 12          # 12 rolling windows ≈ 1 year of WFA
  drawdown_cap_pct: 8.0  # max DD constraint per setup; over → demote
  min_monthly_coverage: 30  # below = parameter too tight; flag

# Fundamental二筛 (pre-Tier filter). All three must pass to enter long pool.
fundamental_filter:
  enabled: true
  min_total_mv_yi: 30        # 总市值 ≥ 30 亿元
  roe_lookback_quarters: 4   # 近 N 季 ROE 不能全部为负
  st_lookback_days: 365      # 1 年内戴过 ST/*ST 帽子 → 剔除

# 集中度约束 (per L2 SW sector cap).
concentration:
  enabled: true
  tier_a_per_l2_max: 3       # Tier A 同 L2 上限
  tier_b_per_l2_max: 6       # Tier B 同 L2 上限
  tier_ab_per_l2_max: 7      # Tier A+B 合计上限

# 黑天鹅 — 6 类(硬剔 + 软警示)
blacklist:
  hard:
    suspended: true                # ta.suspend_limit
    st_status: true                # name 含 ST/*ST
    investigation: true            # 立案调查 (anns_d)
    major_restructuring: true      # 重大资产重组
  soft:
    severe_forecast_miss: true     # 业绩预告 ref_value < threshold
    severe_forecast_threshold: -50 # %
    insider_selling: true          # 大股东减持

# 持仓状态机 (T+15 真实追踪).
position_tracking:
  enabled: true
  horizons_trade_days: [5, 10, 15]   # 主追踪窗
  exit_priority: ["stop_hit", "target_hit", "time_exit"]
  fill_window_trade_days: 1          # T+1 不成交 → unfilled
  unfilled_max_premium_pct: 0.5      # T+1 open > entry × 1.005 → 视作 unfilled (避免追涨成交)

# ─── M10 P2 — Setup-level tunable thresholds (every gate is dynamic) ──────
# Every "if X < N: return None" gate in a setup file reads from here.
# When a key is missing, the setup falls back to its hardcoded default
# (preserving backward compat). Use `ta_setup_param_tune.py` to grid-search
# these against combined T+15/T+10/T+5 objective.
setups:
  T1_BREAKOUT:
    # No filter gates beyond MA-stack + 20d high; all numeric below are
    # scoring/strength clamps, intentionally fixed (not tuned).

  T2_PULLBACK_RESUME:
    ma20_touch_max_x: 1.02            # recent_low > X × ma20 → not a pullback
    rsi_lower: 30                      # RSI mid-band entry
    rsi_upper: 60

  T3_ACCELERATION:
    ret_5d_min: 0.05                   # 5-day return floor

  P1_MA20_PULLBACK:
    ma20_touch_max_x: 1.01
    panic_volume_ratio_max: 1.2        # not panic — vol_ratio < this
    rsi_max: 50                        # RSI ceiling for "still has room"

  P2_GAP_FILL:
    # Pure pattern detection — no scalar gates beyond price relationships.

  P3_TIGHT_CONSOLIDATION:
    prior_gain_min: 0.10               # prior 20d ≥ this
    box_range_max: 0.05                # 5d box ≤ this fraction
    drying_volume_ratio_max: 0.8

  R1_DOUBLE_BOTTOM:
    bottom_diff_max: 0.03              # two lows within 3% of each other
    bottom_to_peak_min: 0.05           # peak ≥ 5% above bottoms
    bottom_separation_min: 5           # bars between two lows

  R2_HS_BOTTOM:
    shoulder_above_head_min: 0.03      # shoulders ≥ 3% above head
    shoulder_diff_max: 0.05            # within 5% of each other
    shoulder_diff_symmetric_max: 0.03  # for "symmetric" trigger

  R3_HAMMER:
    body_pct_max: 0.35                 # body / total range
    shadow_to_body_min: 2.0            # lower shadow ≥ 2× body
    downtrend_max: -0.08                # 20d return ≤ this (must be falling)

  F1_FLAG:
    pole_min: 0.08
    flag_range_max: 0.09
    flag_drift_min: -0.08              # -8% downward drift OK
    flag_drift_max: 0.03

  F2_TRIANGLE:
    contraction_max: 0.6               # late_range / early_range < this

  F3_RECTANGLE:
    box_range_max: 0.08

  V1_VOL_PRICE_UP:
    ret_5d_min: 0.05
    vol_ratio_min: 1.5

  V2_QUIET_COIL:
    vol_ratio_max: 0.7
    box_range_max: 0.04

  S1_SECTOR_RESONANCE:
    l1_pct_min: 1.0
    l2_pct_min: 1.5
    stock_ret_min_pct: 2.0

  S2_LEADER_FOLLOWTHROUGH:
    l2_pct_min: 2.0
    outperform_l2_min_pp: 2.0

  S3_LAGGARD_CATCHUP:
    l2_pct_min: 2.0
    stock_20d_max_pct: 5.0             # was a "true laggard" only if ≤ this
    today_ret_min_pct: 3.0             # caught-up today by ≥ this

  C1_CHIP_CONCENTRATED:
    concentration_pct_max: 15

  C2_CHIP_LOOSE:
    concentration_pct_min: 25
    winner_rate_min: 80
    ret_20d_min: 0.15

  O1_INST_PERSISTENT_BUY:
    flow_5d_pct_min: 1.0               # 5d super-large net flow / float MV
    pct_chg_min: -3.0

  O2_LHB_INST_BUY:
    pct_float_min: 0.5
    inst_days_min: 1                    # ≥ N days of LHB inst buying in last 5d

  O3_LIMIT_SEAL_STRENGTH:
    seal_ratio_min: 1.0

  D1_DOUBLE_TOP:
    peak_diff_max: 0.02
    trough_drop_min: 0.05
    break_depth_min_pct: 1.0
    ret_20d_min_pct: 10.0

  D2_HS_TOP:
    shoulder_diff_max: 0.05
    head_above_shoulder_min: 0.03
    head_above_shoulder_max: 0.20
    break_depth_min_pct: 1.0
    ret_30d_min_pct: 8.0

  D3_SHOOTING_STAR:
    upper_ratio_min: 0.6
    body_ratio_max: 0.3
    ret_20d_min_pct: 15.0

  Z1_ZSCORE_EXTREME:
    z_abs_min: 2.0
    short_runup_min_pct: 15.0          # |z| ≥ X required when direction='short'

  Z2_OVERSOLD_REBOUND:
    rsi_max: 25
    ret_5d_max_pct: -5.0
    ma60_drop_max_x: 0.85              # closes[-1] >= closes[-60] × this

  E1_EVENT_CATALYST:
    days_to_disclosure_max: 5
