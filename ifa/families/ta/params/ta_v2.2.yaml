ranker:
  decay:
    observation_floor_pp: -10
    suspension_floor_pp: -15
  diversity:
    top_cap_per_setup: 3
  regime_boost: 0.1
  winrate:
    floor_ratio: 0.4
    target_pct: 30
  tiers:
    a_size: 10
    b_size: 20
    c_size: 100
universe:
  min_avg_amount_yi: 0.2          # 20d avg amount 下限：0.2 亿元 = 2000 万元
  min_coverage_pct: 90            # 20d 内有 raw_daily 行的天数比例（剔除停牌）

sector_flow:
  # ── Layer 1 — DISCRETE governance switches (A/B test, not continuous tune) ──
  exclude_retreat_phase: true     # 退潮 cycle_phase 直接剔除股票
  exclude_retreat_role: true      # 退潮 role 直接剔除
  exclude_unidentified_role: false # 未识别 role 是否剔除（默认保留）

  # ── Layer 2 — CONTINUOUS scoring weights (greedy-search optimizable) ──
  quality_weight_min: 0.6         # 最差留 60% — 防止极端归零导致候选稀缺
  quality_weight_max: 1.0         # 最好不再加成 — 防止 macro 过拟合
  net_outflow_pct_floor: 0.10     # net_amount percentile <10% 触发硬剔除
  rank_weight: 0.5                # 板块当日 net_amount 横截面 rank 权重
  phase_weight: 0.3               # data-derived phase score 权重
  confidence_weight: 0.2          # SmartMoney role/phase 置信度权重

  # NOTE: phase_scores INTENTIONALLY NOT here — auto-derived from rolling 60d
  # T+15 historical returns by metrics.compute_sector_phase_metrics. As market
  # behavior shifts, scores adapt. See ta/sector_phase_metrics.py.
regime:
  thresholds:
    cooldown:
      n_down_min: 3000
      n_limit_down_strong: 25
      n_limit_down_weak: 15
      udr_med: 0.7
      udr_strong: 0.6
      udr_weak: 0.8
    distribution_risk:
      ld_vs_lu_ratio: 1.5
      n_down_strong: 4500
      n_limit_down_strong: 50
      n_limit_down_with_down: 30
    early_risk_on:
      absolute_lu_min: 70
      absolute_up_min: 4000
      udr_strong_min: 1.7
    range_bound:
      ma_diff_pct_max: 0.01
      vol_pct_max: 8
  vetos:
    range_bound:
      cooldown_path_n_down_min: 3000
      cooldown_path_udr_max: 0.7
      n_down_max: 3700
      n_limit_down_max: 25
      n_limit_up_max: 80
      n_up_max: 4200
    trend_continuation:
      defer_to_early_lu_min: 70
      defer_to_early_up_min: 4000
      n_down_max: 3700
      n_limit_down_max: 25
      udr_min: 1.265
version: 2.2.0
