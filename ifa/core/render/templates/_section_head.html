{# Reusable section head: number + title + optional intro. id for TOC anchors. #}
<header class="ifa-section__head" id="s{{ s.order }}">
  <span class="ifa-section__num">§{{ "%02d"|format(s.order) }}</span>
  <h2 class="ifa-section__title">{{ s.title }}</h2>
</header>
{% if s.content_json.intro %}
<p class="ifa-section__intro">{{ s.content_json.intro }}</p>
{% endif %}
